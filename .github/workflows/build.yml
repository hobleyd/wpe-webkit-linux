name: build-wpewebkit

# Build libwpewebkit-1.0-dev on Ubuntu 24.04 (Noble) and publish to an APT
# repository hosted on GitHub Pages at hobleyd.github.io/wpe-webkit-linux.
#
# WPEWebKit 2.36.x is the last stable release series that ships the
# wpewebkit-1.0 pkg-config ABI (libWPEWebKit-1.0.so), which is what
# flutter_inappwebview_linux 0.1.0-beta.1 requires.  WPEWebKit 2.38+
# switched to the wpe-webkit-2.0 ABI (libWPEWebKit-2.0.so, wpe-webkit-2.0.pc),
# which is incompatible with flutter_inappwebview_linux's cmake checks.
# Building here against Ubuntu 24.04 gives us glibc 2.39 compatible binaries.
#
# libwpe, libwpebackend-fdo, and libwoff2 are all built from source: Ubuntu 24.04
# dropped all WPE packages, and libwoff2-dev is only in the universe component
# which is unreliable to enable on GitHub Actions ubuntu-24.04 runners (DEB822
# apt format). Building from source makes the APT repo fully self-contained.
#
# CRITICAL: cmake flags must include -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2
# Ubuntu 24.04's GCC defaults to FORTIFY_SOURCE=3 which pulls in glibc 2.42
# symbols.  Overriding to =2 keeps binaries compatible with glibc 2.39.

on:
  workflow_dispatch:
    inputs:
      wpewebkit_version:
        description: 'WPEWebKit version (must be 2.36.x — last series with wpewebkit-1.0 ABI; 2.38+ uses wpe-webkit-2.0)'
        required: true
        default: '2.36.8'
      libwpe_version:
        description: 'libwpe version'
        required: true
        default: '1.16.0'
      wpebackend_fdo_version:
        description: 'WPEBackend-fdo version'
        required: true
        default: '1.14.2'
  push:
    tags:
      - 'wpewebkit-*'

permissions:
  contents: write
  pages: write

env:
  WPEWEBKIT_VERSION: ${{ github.event.inputs.wpewebkit_version || '2.36.8' }}
  LIBWPE_VERSION: ${{ github.event.inputs.libwpe_version || '1.16.0' }}
  WPEBACKEND_FDO_VERSION: ${{ github.event.inputs.wpebackend_fdo_version || '1.14.2' }}
  DISTRO: noble

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake meson ninja-build pkg-config python3 ruby perl \
            bison flex gperf unifdef gettext \
            libglib2.0-dev libgcrypt20-dev \
            libsoup-3.0-dev libxml2-dev libxslt1-dev \
            libcairo2-dev libfontconfig1-dev libfreetype-dev \
            libharfbuzz-dev libicu-dev libpango1.0-dev \
            libsqlite3-dev libwebp-dev libjpeg-dev libpng-dev libopenjp2-7-dev \
            libbrotli-dev libopus-dev libavif-dev libjxl-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            libepoxy-dev libgbm-dev \
            libegl-dev libwayland-dev wayland-protocols libxkbcommon-dev \
            libunwind-dev libseccomp-dev \
            libenchant-2-dev libhyphen-dev liblcms2-dev \
            libmanette-0.2-dev \
            dpkg-dev debhelper fakeroot

      - name: Build woff2 from source
        run: |
          curl -fL https://github.com/google/woff2/archive/refs/tags/v1.0.2.tar.gz \
            -o woff2.tar.gz
          mkdir woff2-src
          tar xf woff2.tar.gz --strip-components=1 -C woff2-src
          cmake -S woff2-src -B woff2-build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=lib/x86_64-linux-gnu \
            -DCMAKE_C_FLAGS="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2" \
            -DCMAKE_CXX_FLAGS="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2"
          ninja -C woff2-build
          DESTDIR=${{ github.workspace }}/staging-woff2 ninja -C woff2-build install
          sudo cp -rP staging-woff2/usr/* /usr/
          sudo ldconfig

      - name: Package woff2
        run: |
          WOFF2VER="1.0.2-1~${DISTRO}1"

          # Runtime: libwoff2-1
          PKG=libwoff2-1
          DIR="pkg/${PKG}_${WOFF2VER}_amd64"
          mkdir -p "${DIR}/DEBIAN" "${DIR}/usr/lib/x86_64-linux-gnu"
          cp -a staging-woff2/usr/lib/x86_64-linux-gnu/libwoff2*.so.* \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${WOFF2VER}
          Architecture: amd64
          Section: libs
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libbrotli1
          Description: WebFont compression library (runtime)
           WOFF2 is a font compression format for the web.
          EOF
          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${WOFF2VER}_amd64.deb"

          # Development: libwoff2-dev
          PKG=libwoff2-dev
          DIR="pkg/${PKG}_${WOFF2VER}_amd64"
          mkdir -p "${DIR}/DEBIAN" \
                   "${DIR}/usr/lib/x86_64-linux-gnu" \
                   "${DIR}/usr/include"
          [ -d staging-woff2/usr/include/woff2 ] && \
            cp -a staging-woff2/usr/include/woff2 "${DIR}/usr/include/"
          find staging-woff2/usr/lib/x86_64-linux-gnu -maxdepth 1 \
            -name "libwoff2*.so" | xargs -r -I{} cp -a {} \
            "${DIR}/usr/lib/x86_64-linux-gnu/"
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${WOFF2VER}
          Architecture: amd64
          Section: libdevel
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libwoff2-1 (= ${WOFF2VER})
          Description: WebFont compression library (development)
           Development headers for libwoff2.
          EOF
          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${WOFF2VER}_amd64.deb"

      - name: Build libwpe from source
        run: |
          curl -fL "https://github.com/WebPlatformForEmbedded/libwpe/archive/refs/tags/${LIBWPE_VERSION}.tar.gz" \
            -o libwpe.tar.gz
          mkdir libwpe-src
          tar xf libwpe.tar.gz --strip-components=1 -C libwpe-src
          cmake -S libwpe-src -B libwpe-build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=lib/x86_64-linux-gnu \
            -DCMAKE_C_FLAGS="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2" \
            -DCMAKE_CXX_FLAGS="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2"
          ninja -C libwpe-build
          DESTDIR=${{ github.workspace }}/staging-libwpe ninja -C libwpe-build install
          # Install to system so WPEBackend-fdo and WPEWebKit can find it
          sudo cp -rP staging-libwpe/usr/* /usr/
          sudo ldconfig

      - name: Package libwpe
        run: |
          LIBVER="${LIBWPE_VERSION}-1~${DISTRO}1"

          # Runtime: libwpe-1.0-1
          PKG=libwpe-1.0-1
          DIR="pkg/${PKG}_${LIBVER}_amd64"
          mkdir -p "${DIR}/DEBIAN" "${DIR}/usr/lib/x86_64-linux-gnu"
          cp -a staging-libwpe/usr/lib/x86_64-linux-gnu/libwpe-1.0.so.* \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${LIBVER}
          Architecture: amd64
          Section: libs
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Description: WPE platform library (runtime)
           libwpe is a general-purpose library for the WPE WebKit port.
          EOF
          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${LIBVER}_amd64.deb"

          # Development: libwpe-1.0-dev
          PKG=libwpe-1.0-dev
          DIR="pkg/${PKG}_${LIBVER}_amd64"
          mkdir -p "${DIR}/DEBIAN" \
                   "${DIR}/usr/lib/x86_64-linux-gnu/pkgconfig" \
                   "${DIR}/usr/include"
          [ -d staging-libwpe/usr/include/wpe-1.0 ] && \
            cp -a staging-libwpe/usr/include/wpe-1.0 "${DIR}/usr/include/"
          cp -a staging-libwpe/usr/lib/x86_64-linux-gnu/libwpe-1.0.so \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
          find staging-libwpe -name "wpe-1.0.pc" 2>/dev/null | head -1 | \
            xargs -r -I{} cp {} "${DIR}/usr/lib/x86_64-linux-gnu/pkgconfig/"
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${LIBVER}
          Architecture: amd64
          Section: libdevel
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libwpe-1.0-1 (= ${LIBVER})
          Description: WPE platform library (development)
           Development headers and pkg-config for libwpe-1.0.
          EOF
          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${LIBVER}_amd64.deb"

      - name: Build WPEBackend-fdo from source
        run: |
          curl -fL "https://github.com/Igalia/WPEBackend-fdo/archive/refs/tags/${WPEBACKEND_FDO_VERSION}.tar.gz" \
            -o wpebackend-fdo.tar.gz
          mkdir wpebackend-fdo-src
          tar xf wpebackend-fdo.tar.gz --strip-components=1 -C wpebackend-fdo-src
          # WPEBackend-fdo 1.14+ uses meson, not cmake
          meson setup wpebackend-fdo-build wpebackend-fdo-src \
            --prefix=/usr \
            --libdir=lib/x86_64-linux-gnu \
            -Dbuildtype=release \
            -Dc_args="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2" \
            -Dcpp_args="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2"
          ninja -C wpebackend-fdo-build
          DESTDIR=${{ github.workspace }}/staging-wpebackend-fdo \
            ninja -C wpebackend-fdo-build install
          # Install to system so WPEWebKit can find it
          sudo cp -rP staging-wpebackend-fdo/usr/* /usr/
          sudo ldconfig

      - name: Package WPEBackend-fdo
        run: |
          FDOVER="${WPEBACKEND_FDO_VERSION}-1~${DISTRO}1"

          # Runtime: libwpebackend-fdo-1.0-1
          PKG=libwpebackend-fdo-1.0-1
          DIR="pkg/${PKG}_${FDOVER}_amd64"
          mkdir -p "${DIR}/DEBIAN" "${DIR}/usr/lib/x86_64-linux-gnu"
          cp -a staging-wpebackend-fdo/usr/lib/x86_64-linux-gnu/libWPEBackend-fdo-1.0.so.* \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${FDOVER}
          Architecture: amd64
          Section: libs
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libwpe-1.0-1
          Description: WPE FDO backend (runtime)
           FDO backend for the WPE WebKit web content engine.
          EOF
          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${FDOVER}_amd64.deb"

          # Development: libwpebackend-fdo-1.0-dev
          PKG=libwpebackend-fdo-1.0-dev
          DIR="pkg/${PKG}_${FDOVER}_amd64"
          mkdir -p "${DIR}/DEBIAN" \
                   "${DIR}/usr/lib/x86_64-linux-gnu/pkgconfig" \
                   "${DIR}/usr/include"
          [ -d staging-wpebackend-fdo/usr/include/wpe ] && \
            cp -a staging-wpebackend-fdo/usr/include/wpe "${DIR}/usr/include/"
          cp -a staging-wpebackend-fdo/usr/lib/x86_64-linux-gnu/libWPEBackend-fdo-1.0.so \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
          find staging-wpebackend-fdo -name "wpebackend-fdo-1.0.pc" 2>/dev/null | head -1 | \
            xargs -r -I{} cp {} "${DIR}/usr/lib/x86_64-linux-gnu/pkgconfig/"
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${FDOVER}
          Architecture: amd64
          Section: libdevel
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libwpebackend-fdo-1.0-1 (= ${FDOVER})
          Description: WPE FDO backend (development)
           Development headers and pkg-config for libwpebackend-fdo-1.0.
          EOF
          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${FDOVER}_amd64.deb"

      # Cache the cmake build dir — WebKit takes ~60-90 min to compile.
      # Cache key includes the version so a version bump triggers a fresh build.
      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: wpewebkit-build-${{ env.WPEWEBKIT_VERSION }}-${{ runner.os }}-v4

      - name: Download WPEWebKit source
        run: |
          if [ ! -d wpewebkit-src ]; then
            # wpewebkit.org only hosts recent releases; fall back to webkitgtk.org
            # which mirrors the same source tree (cmake -DPORT=WPE builds WPE from either)
            curl -fL \
              "https://wpewebkit.org/releases/wpewebkit-${WPEWEBKIT_VERSION}.tar.xz" \
              -o wpewebkit.tar.xz 2>/dev/null || \
            curl -fL \
              "https://webkitgtk.org/releases/webkitgtk-${WPEWEBKIT_VERSION}.tar.xz" \
              -o wpewebkit.tar.xz
            tar xf wpewebkit.tar.xz
            # tarball extracts as either wpewebkit-VERSION or webkitgtk-VERSION
            if [ -d "wpewebkit-${WPEWEBKIT_VERSION}" ]; then
              mv "wpewebkit-${WPEWEBKIT_VERSION}" wpewebkit-src
            elif [ -d "webkitgtk-${WPEWEBKIT_VERSION}" ]; then
              mv "webkitgtk-${WPEWEBKIT_VERSION}" wpewebkit-src
            else
              echo "ERROR: could not find extracted source directory"; exit 1
            fi
          fi

      - name: Patch WPEWebKit source for Ruby 3.2 and GCC 13 compatibility
        run: |
          # Ruby 3.2 removed File.exists? (deprecated since 1.9.3); use File.exist?
          find wpewebkit-src/Source/JavaScriptCore/offlineasm -name "*.rb" \
            -exec sed -i 's/File\.exists?/File.exist?/g' {} +

          # GCC 13 requires explicit <cstdint> for uint64_t/uint32_t; older
          # compilers pulled it in transitively via other system headers.
          sed -i '/#include <vector>/a #include <cstdint>' \
            wpewebkit-src/Source/ThirdParty/ANGLE/include/GLSLANG/ShaderVars.h

          # SerializableErrorType has no write() overload; GCC 13 refuses the
          # implicit enum→uint8_t conversion that older compilers accepted.
          # Use Python to avoid shell-escaping issues with < > in static_cast.
          python3 - <<'PYEOF'
          import sys
          path = 'wpewebkit-src/Source/WebCore/bindings/js/SerializedScriptValue.cpp'
          old = 'write(errorNameToSerializableErrorType(errorTypeString));'
          new = 'write(static_cast<uint8_t>(errorNameToSerializableErrorType(errorTypeString)));'
          with open(path) as f:
              content = f.read()
          if old not in content:
              print(f'WARNING: GCC 13 patch pattern not found in {path}, skipping')
          else:
              with open(path, 'w') as f:
                  f.write(content.replace(old, new))
              print('Patched SerializedScriptValue.cpp successfully')
          PYEOF

      - name: Configure WPEWebKit
        run: |
          cmake -S wpewebkit-src -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=lib/x86_64-linux-gnu \
            -DPORT=WPE \
            -DENABLE_INTROSPECTION=OFF \
            -DENABLE_DOCUMENTATION=OFF \
            -DENABLE_MINIBROWSER=OFF \
            -DENABLE_API_TESTS=OFF \
            -DENABLE_LAYOUT_TESTS=OFF \
            -DUSE_SOUP2=OFF \
            -DENABLE_GAMEPAD=OFF \
            -DENABLE_SPEECH_SYNTHESIS=OFF \
            -DENABLE_WEB_CRYPTO=OFF \
            -DENABLE_ACCESSIBILITY=OFF \
            -DENABLE_JOURNALD_LOG=OFF \
            -DENABLE_BUBBLEWRAP_SANDBOX=OFF \
            -DCMAKE_C_FLAGS="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2" \
            -DCMAKE_CXX_FLAGS="-O2 -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=2"

      - name: Build WPEWebKit
        run: ninja -C build -j$(nproc)
        timeout-minutes: 120

      - name: Install to staging directory
        run: |
          DESTDIR=${{ github.workspace }}/staging ninja -C build install

      - name: Debug staging layout
        run: |
          echo "=== .pc files ==="
          find staging -name "*.pc" | sort
          echo "=== WPEWebKit .so files ==="
          find staging -name "*WPEWebKit*.so*" | sort
          echo "=== include dirs ==="
          find staging/usr/include -maxdepth 2 -type d 2>/dev/null | sort
          echo "=== full staging tree (5 levels) ==="
          find staging -maxdepth 5 | sort

      - name: Package libwpewebkit-1.0-3 (runtime)
        run: |
          PKG=libwpewebkit-1.0-3
          VERSION="${WPEWEBKIT_VERSION}-1~${DISTRO}1"
          DIR="pkg/${PKG}_${VERSION}_amd64"
          mkdir -p "${DIR}/DEBIAN" "${DIR}/usr/lib/x86_64-linux-gnu"

          # Copy shared libraries (not headers/pkgconfig)
          cp -a staging/usr/lib/x86_64-linux-gnu/libWPEWebKit-1.0*.so* \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true
          # WebKit data files
          if [ -d staging/usr/share/wpe ]; then
            mkdir -p "${DIR}/usr/share"
            cp -a staging/usr/share/wpe "${DIR}/usr/share/"
          fi
          if [ -d staging/usr/share/wpewebkit ]; then
            mkdir -p "${DIR}/usr/share"
            cp -a staging/usr/share/wpewebkit "${DIR}/usr/share/"
          fi
          # GStreamer plugin
          if [ -d staging/usr/lib/x86_64-linux-gnu/gstreamer-1.0 ]; then
            mkdir -p "${DIR}/usr/lib/x86_64-linux-gnu"
            cp -a staging/usr/lib/x86_64-linux-gnu/gstreamer-1.0 \
              "${DIR}/usr/lib/x86_64-linux-gnu/"
          fi
          # Injected bundle, inspector resources, etc. (wpe-webkit-1.0/ subdir)
          for d in staging/usr/lib/x86_64-linux-gnu/wpe-webkit-*/; do
            [ -d "$d" ] && cp -a "$d" "${DIR}/usr/lib/x86_64-linux-gnu/" || true
          done
          # Web/network process helpers
          if [ -d staging/usr/libexec ]; then
            mkdir -p "${DIR}/usr"
            cp -a staging/usr/libexec "${DIR}/usr/"
          fi

          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${VERSION}
          Architecture: amd64
          Section: libs
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libwpe-1.0-1, libwpebackend-fdo-1.0-1, libwoff2-1
          Description: WPE WebKit web content engine for embedded devices (runtime)
           WPEWebKit is the WebKit port for WPE (Web Platform for Embedded).
           This package contains the runtime shared libraries.
          EOF

          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${VERSION}_amd64.deb"

      - name: Package libwpewebkit-1.0-dev (development)
        run: |
          PKG=libwpewebkit-1.0-dev
          VERSION="${WPEWEBKIT_VERSION}-1~${DISTRO}1"
          DIR="pkg/${PKG}_${VERSION}_amd64"
          mkdir -p "${DIR}/DEBIAN" \
                   "${DIR}/usr/lib/x86_64-linux-gnu" \
                   "${DIR}/usr/include" \
                   "${DIR}/usr/lib/x86_64-linux-gnu/pkgconfig"

          # Headers
          [ -d staging/usr/include/wpe-webkit-1.0 ] && \
            cp -a staging/usr/include/wpe-webkit-1.0 "${DIR}/usr/include/"
          [ -d staging/usr/include/wpe-webkit ] && \
            cp -a staging/usr/include/wpe-webkit "${DIR}/usr/include/"

          # .so symlink (unversioned, for linking)
          find staging/usr/lib/x86_64-linux-gnu -maxdepth 1 \
            -name "libWPEWebKit-1.0.so" | xargs -r -I{} cp -a {} \
            "${DIR}/usr/lib/x86_64-linux-gnu/" 2>/dev/null || true

          # pkg-config — search entire staging/usr/lib in case LIBDIR varied
          find staging/usr/lib -name "wpewebkit-1.0.pc" 2>/dev/null | head -1 | \
            xargs -r -I{} cp {} "${DIR}/usr/lib/x86_64-linux-gnu/pkgconfig/"

          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${VERSION}
          Architecture: amd64
          Section: libdevel
          Priority: optional
          Maintainer: David Hobley <david@sharpblue.com.au>
          Depends: libwpewebkit-1.0-3 (= ${VERSION})
          Description: WPEWebKit web content engine for embedded devices (development)
           Development headers and pkg-config file for libwpewebkit-1.0.
          EOF

          dpkg-deb --build --root-owner-group "${DIR}" \
            "pkg/${PKG}_${VERSION}_amd64.deb"

      - name: Verify package contents
        run: |
          echo "=== libwpewebkit-1.0-dev contents ==="
          dpkg-deb --contents pkg/libwpewebkit-1.0-dev_*.deb
          echo ""
          echo "=== checking for wpewebkit-1.0.pc ==="
          dpkg-deb --contents pkg/libwpewebkit-1.0-dev_*.deb | grep -q wpewebkit-1.0.pc \
            && echo "OK: wpewebkit-1.0.pc present" \
            || { echo "ERROR: wpewebkit-1.0.pc missing from package!"; exit 1; }
          echo "=== checking for libWPEWebKit-1.0.so ==="
          dpkg-deb --contents pkg/libwpewebkit-1.0-dev_*.deb | grep -q "libWPEWebKit-1.0\.so$" \
            && echo "OK: libWPEWebKit-1.0.so present" \
            || { echo "ERROR: libWPEWebKit-1.0.so symlink missing from package!"; exit 1; }

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wpewebkit-noble-amd64
          path: pkg/*.deb

  publish:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event.inputs.wpewebkit_version != ''
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: wpewebkit-noble-amd64
          path: pkg/

      - name: Install reprepro
        run: sudo apt-get install -y reprepro gnupg

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Prepare gh-pages workspace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --heads "$REPO_URL" gh-pages | grep -q gh-pages; then
            git clone --depth=1 --branch=gh-pages "$REPO_URL" gh-pages
          else
            mkdir gh-pages
            cd gh-pages
            git init
            git remote add origin "$REPO_URL"
            git checkout --orphan gh-pages
          fi

      - name: Configure APT repo
        run: |
          mkdir -p gh-pages/apt/conf

          # Strip newlines — copy-pasting a key ID from a terminal commonly
          # adds a trailing newline to the secret, which breaks gpg lookup.
          GPG_KEY_ID=$(printf '%s' "${{ secrets.GPG_KEY_ID }}" | tr -d '\n\r')

          # Recreated each run so the key ID stays in sync with the signing key.
          cat > gh-pages/apt/conf/distributions <<EOF
          Origin: wpe-webkit-linux
          Label: wpe-webkit-linux
          Codename: ${{ env.DISTRO }}
          Architectures: amd64
          Components: main
          Description: WPEWebKit 1.0 for Ubuntu 24.04 (Noble)
          SignWith: ${GPG_KEY_ID}
          EOF

          # Ensure no CNAME file is ever committed to gh-pages. GitHub Pages
          # auto-configures the custom domain from this file; having it present
          # overrides the Settings → Pages custom domain field on every deploy,
          # which would silently redirect github.io back to the custom domain.
          rm -f gh-pages/CNAME

          # Export public key so consumers can download it.
          gpg --armor --export "${GPG_KEY_ID}" > gh-pages/wpe-webkit-linux.gpg
          if [ ! -s gh-pages/wpe-webkit-linux.gpg ]; then
            echo "Key ID lookup produced nothing, exporting all keys in keyring"
            gpg --armor --export > gh-pages/wpe-webkit-linux.gpg
          fi
          if [ ! -s gh-pages/wpe-webkit-linux.gpg ]; then
            echo "ERROR: GPG export is empty. Check GPG_PRIVATE_KEY and GPG_KEY_ID secrets."
            exit 1
          fi
          echo "GPG key exported: $(wc -c < gh-pages/wpe-webkit-linux.gpg) bytes"

      - name: Publish packages
        run: |
          cd gh-pages
          # Remove previous versions to keep pool/ size bounded
          reprepro -b apt remove ${{ env.DISTRO }} \
            libwoff2-1 libwoff2-dev \
            libwpe-1.0-1 libwpe-1.0-dev \
            libwpebackend-fdo-1.0-1 libwpebackend-fdo-1.0-dev \
            libwpewebkit-1.0-3 libwpewebkit-1.0-dev 2>/dev/null || true
          for deb in ../pkg/*.deb; do
            reprepro -b apt includedeb ${{ env.DISTRO }} "$deb"
          done

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || \
            git commit -m "chore: publish WPEWebKit ${{ env.WPEWEBKIT_VERSION }}"
          git push origin gh-pages
